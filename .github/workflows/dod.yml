name: Definition of Done
on: pull_request
jobs:
  dod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required structure
        run: |
          test -f AGENTS.md
          test -f .specs/architecture/PROVIDERS.md
          test -f .specs/architecture/DESIGN.md
          test -f .env.example
          test -d .skills
          test -d lib/providers
          test -d e2e
          echo "Structure OK"
      - name: Verify no committed .env
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env must not be committed"; exit 1
          fi
